kind = "web"
previewPath = "/"
title = "Uncurated"
version = "1.0.0"
id = "artifacts/taste-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25961

[services.development]
run = "pnpm --filter @workspace/taste-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taste-app", "run", "build" ]
publicDir = "artifacts/taste-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25961"
BASE_PATH = "/"
