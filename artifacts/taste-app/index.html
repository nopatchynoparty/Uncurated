<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Uncurated — honest recommendations</title>
    <meta name="description" content="An honest, agenda-free recommendation engine. No algorithms, no sponsors, just recommendations based on your actual taste." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Uncurated — honest recommendations" />
    <meta property="og:description" content="An honest, agenda-free recommendation engine. No algorithms, no sponsors." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Uncurated" />
    <meta name="twitter:description" content="Honest, agenda-free recommendations powered by AI." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="logo">
          <span class="logo-text"><span class="logo-un">Un</span>curated</span>
        </div>
        <p class="tagline">No algorithms. No sponsors. Just honest recommendations.</p>
      </header>

      <main class="main">
        <section class="categories">
          <button class="category-btn active" data-category="books">Books</button>
          <button class="category-btn coming-soon" disabled>Podcasts <span class="badge">Soon</span></button>
          <button class="category-btn coming-soon" disabled>TV <span class="badge">Soon</span></button>
          <button class="category-btn coming-soon" disabled>Music <span class="badge">Soon</span></button>
        </section>

        <section class="input-section">
          <div class="input-label-row">
            <label class="input-label" for="item-input">What books have you read?</label>
            <button class="import-btn" id="import-btn" type="button">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Import Goodreads CSV
            </button>
            <input type="file" id="csv-file-input" accept=".csv" style="display:none" />
          </div>
          <div class="input-row">
            <input
              type="text"
              id="item-input"
              class="item-input"
              placeholder="e.g. The Road, Sapiens, Dune…"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="add-btn" id="add-btn" aria-label="Add item">+</button>
          </div>
          <p class="input-hint">Press Enter or click + to add. Add at least 3 items for better results.</p>
        </section>

        <section class="items-section" id="items-section" style="display:none">
          <ul class="items-list" id="items-list"></ul>
        </section>

        <div class="cta-row" id="cta-row" style="display:none">
          <button class="find-btn" id="find-btn">
            <span class="find-btn-text">Find my recommendations</span>
            <span class="find-btn-loader" id="find-loader" aria-hidden="true"></span>
          </button>
        </div>

        <section class="results-section" id="results-section" style="display:none">
          <div class="taste-profile-card" id="taste-profile-card">
            <div class="taste-profile-header">
              <h2 class="taste-profile-title">Your Uncurated Profile</h2>
              <button class="copy-btn" id="copy-btn" title="Copy shareable summary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                <span class="copy-label">Share</span>
              </button>
            </div>
            <p class="taste-profile-text" id="taste-profile-text"></p>
          </div>

          <h2 class="recs-title">Recommended for you</h2>
          <ol class="recs-list" id="recs-list"></ol>
        </section>
      </main>

      <footer class="footer">
        <p>Uncurated · Powered by Claude · No affiliate data collected · <a href="https://tally.so/r/2E1DP9" target="_blank" rel="noopener noreferrer" class="footer-link">Give feedback</a></p>
      </footer>
    </div>

    <template id="item-template">
      <li class="item-row">
        <span class="item-name"></span>
        <div class="rating-group">
          <button class="rating-btn" data-rating="loved">Loved</button>
          <button class="rating-btn" data-rating="liked">Liked</button>
          <button class="rating-btn" data-rating="meh">Meh</button>
          <button class="rating-btn" data-rating="hated">Hated</button>
          <button class="rating-btn" data-rating="abandoned">DNF</button>
        </div>
        <button class="remove-btn" aria-label="Remove">×</button>
      </li>
    </template>

    <template id="rec-template">
      <li class="rec-card">
        <div class="rec-header">
          <div class="rec-meta">
            <span class="rec-title"></span>
            <span class="rec-author"></span>
          </div>
          <div class="rec-score-wrap">
            <span class="rec-score"></span>
            <span class="rec-score-label">match</span>
          </div>
        </div>
        <p class="rec-why"></p>
        <div class="rec-footer">
          <span class="rec-vibe"></span>
          <div class="rec-actions">
            <button class="read-this-btn" type="button">I've read this</button>
            <a class="rec-link" target="_blank" rel="noopener noreferrer">Find on Amazon →</a>
          </div>
        </div>
        <div class="dismiss-reasons" style="display:none">
          <span class="dismiss-prompt">Why skip this?</span>
          <div class="dismiss-reason-btns">
            <button class="dismiss-reason-btn" type="button" data-reason="Already listen to it">Already listen to it</button>
            <button class="dismiss-reason-btn" type="button" data-reason="Not my kind of host">Not my kind of host</button>
            <button class="dismiss-reason-btn" type="button" data-reason="Too mainstream">Too mainstream</button>
            <button class="dismiss-reason-btn" type="button" data-reason="Not interested in the topic">Not interested in the topic</button>
          </div>
          <button class="dismiss-cancel-btn" type="button">Cancel</button>
        </div>
      </li>
    </template>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
